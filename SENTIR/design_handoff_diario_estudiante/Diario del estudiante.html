<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sami · Diario del estudiante</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #DCD6C8; }
  * { box-sizing: border-box; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; overflow: auto; }
  #canvas { position: relative; width: 1080px; height: 880px; flex-shrink: 0;
    box-shadow: 0 24px 70px rgba(38,48,42,.22); transform-origin: center center; }
  #canvas > div { border-radius: 2px; overflow: hidden; }
</style>
</head>
<body>
<div id="stage">
  <div id="canvas"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="designs/DiaryStudent.jsx"></script>

<script type="text/babel">
  const CW = 1080, CH = 880;
  const canvas = document.getElementById('canvas');
  ReactDOM.createRoot(canvas).render(<window.DiaryStudent />);

  function fit() {
    const pad = 48;
    const s = Math.min((window.innerWidth - pad) / CW, (window.innerHeight - pad) / CH, 1);
    canvas.style.transform = 'scale(' + s + ')';
    // reserve scaled footprint so the grid can center it without clipping
    canvas.style.margin = (CH * (s - 1) / 2) + 'px ' + (CW * (s - 1) / 2) + 'px';
  }
  window.addEventListener('resize', fit);
  fit();
</script>
</body>
</html>
