document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x rgba(69,152,140,.4);}\n  @keyframes ckpop{0%{transform:scale(.3);opacity:0;}55%{transform:scale(1.25);}100%{transform:scale(1);opacity:1;}}\n  @keyframes fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}\n  @keyframes overlayin{from{opacity:0;}to{opacity:1;}}\n  @keyframes slidedowntoast{from{opacity:0;transform:translate(-50%,-12px);}to{opacity:1;transform:translate(-50%,0);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#EDF5F3;font-family:'Work Sans',system-ui,sans-serif;padding:78px 24px 150px;display:flex;flex-direction:column;align-items:center;color:#0A0A0A;\">\n\n  \n\n  <!-- A4 SHEET -->\n  <div style=\"{{ sheetWrapStyle }}\">\n    <div style=\"{{ sheetStyle }}\">\n\n      <!-- HEADER -->\n      <div style=\"margin-bottom:8px;\">\n        <div style=\"font-size:13px;font-weight:600;letter-spacing:.04em;color:#45988C;margin-bottom:14px;\">SAMI BIENESTAR<\u002Fdiv>\n        <h1 style=\"margin:0;font-size:31px;font-weight:700;letter-spacing:-.022em;line-height:1.15;color:#0A0A0A;\">Cuestionario de bienestar<\u002Fh1>\n        <p style=\"margin:12px 0 0;font-size:16px;line-height:1.6;color:#6B7280;max-width:56ch;\">Tómate el tiempo que necesites. No hay respuestas correctas ni incorrectas, y solo tu psicóloga verá lo que respondas. Puedes guardar y seguir más tarde.<\u002Fp>\n        <div style=\"height:6px;border-radius:99px;background:#EDF5F3;margin-top:26px;overflow:hidden;\">\n          <div style=\"{{ progressFillStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:11px;font-size:13px;font-weight:600;color:#6B7280;font-variant-numeric:tabular-nums;\">{{ counterText }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BLOCKS -->\n      <sc-for list=\"{{ blocks }}\" as=\"block\" hint-placeholder-count=\"3\">\n        <div data-blockid=\"{{ block.id }}\" style=\"{{ block.sepStyle }}\">\n          <div style=\"height:1px;background:#C5E1DC;margin-bottom:18px;\"><\u002Fdiv>\n          <div style=\"{{ block.nameStyle }}\">{{ block.name }}<\u002Fdiv>\n          <p style=\"margin:9px 0 0;font-size:15px;line-height:1.55;color:#6B7280;max-width:60ch;\">{{ block.instruction }}<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- MATRIX (escalas compartidas, desktop) -->\n        <sc-if value=\"{{ block.isMatrix }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:18px;\">\n            <div style=\"{{ block.matrix.headStyle }}\">\n              <div><\u002Fdiv>\n              <sc-for list=\"{{ block.matrix.cols }}\" as=\"col\" hint-placeholder-count=\"4\">\n                <div style=\"font-size:11px;font-weight:600;color:#64748B;text-align:center;line-height:1.25;padding:0 5px 10px;align-self:end;\">{{ col }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"height:1px;background:#E2E8F0;margin-bottom:3px;\"><\u002Fdiv>\n            <sc-for list=\"{{ block.matrix.rows }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div class=\"mrow\" data-qid=\"{{ r.qid }}\" style=\"{{ r.rowStyle }}\">\n                <div style=\"display:flex;gap:9px;align-items:flex-start;padding:13px 14px 13px 4px;min-width:0;\">\n                  <span style=\"{{ r.numStyle }}\">{{ r.num }}<\u002Fspan>\n                  <span style=\"flex:1;font-size:14.5px;font-weight:500;color:#1F2937;line-height:1.45;\">{{ r.text }}<\u002Fspan>\n                  <sc-if value=\"{{ r.answered }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"display:flex;padding-top:2px;animation:ckpop .3s ease both;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#45988C\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <sc-for list=\"{{ r.cells }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <button class=\"mcell\" data-qwrap=\"{{ r.qid }}\" onclick=\"{{ c.onClick }}\" aria-label=\"{{ c.label }}\" style=\"display:flex;align-items:center;justify-content:center;padding:13px 4px;background:none;border:none;cursor:pointer;\">\n                    <span class=\"{{ c.circleClass }}\">\n                      <sc-if value=\"{{ c.selected }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                    <\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- FILAS (binarios, texto, y escalas en móvil) -->\n        <sc-if value=\"{{ block.showRows }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-for list=\"{{ block.questions }}\" as=\"q\" hint-placeholder-count=\"5\">\n          <div data-qid=\"{{ q.qid }}\" style=\"{{ q.rowStyle }}\">\n            <div style=\"flex-shrink:0;width:30px;display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-top:1px;\">\n              <span style=\"{{ q.numStyle }}\">{{ q.num }}<\u002Fspan>\n              <sc-if value=\"{{ q.answered }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"display:flex;animation:ckpop .3s ease both;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#45988C\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"{{ q.textStyle }}\">{{ q.text }}<\u002Fdiv>\n\n              <sc-if value=\"{{ q.isText }}\" hint-placeholder-val=\"{{ false }}\">\n                <textarea data-qwrap= x);border-top:1px solid #E6EAE8;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n    <button onclick=\"{{ onSave }}\" style=\"background:none;border:none;color:#6B7280;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;\" style-hover=\"{{ saveHoverStyle }}\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z\"><\u002Fpath><path d=\"M17 21v-8H7v8M7 3v5h8\"><\u002Fpath><\u002Fsvg>\n      Guardar y continuar luego\n    <\u002Fbutton>\n    <button onclick=\"{{ openModal }}\" style=\"display:flex;align-items:center;gap:11px;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 2px;\">\n      <span style=\"width:96px;height:5px;border-radius:99px;background:#E9EEEC;overflow:hidden;display:block;\"><span style=\"{{ miniFillStyle }}\"><\u002Fspan><\u002Fspan>\n      <span style=\"font-size:13px;font-weight:700;color:#374151;font-variant-numeric:tabular-nums;\">{{ pillLabel }}<\u002Fspan>\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9CA3AF\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- SOS PILL -->\n  <button onclick=\"{{ openSos }}\" style=\"position:fixed;right:22px;bottom:64px;z-index:50;background:#FB7185;color:#fff;border:none;border-radius:99px;padding:12px 18px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 10px 26px -8px rgba(244,63,94,.6);display:flex;align-items:center;gap:9px;\" style-hover=\"{{ sosHoverStyle }}\">\n    <span style=\"width:9px;height:9px;border-radius:99px;background:#fff;display:block;box-shadow:0 0 0 4px rgba(255,255,255,.25);\"><\u002Fspan>\n    Necesito ayuda\n  <\u002Fbutton>\n\n  <!-- BLOCK INDEX MODAL -->\n  <sc-if value=\"{{ showModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:80;background:rgba(10,14,13,.35);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:24px;animation:overlayin .15s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:420px;background:#fff;border-radius:22px;box-shadow:0 24px 60px -12px rgba(0,0,0,.3);padding:26px 26px 16px;animation:fadein .2s ease;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;\">\n          <h3 style=\"margin:0;font-size:18px;font-weight:700;color:#0A0A0A;\">Tu avance<\u002Fh3>\n          <span style=\"font-size:13px;font-weight:600;color:#45988C;\">{{ pillLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ modalBlocks }}\" as=\"mb\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ mb.onGo }}\" style=\"display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:none;border:none;border-radius:12px;padding:11px 10px;cursor:pointer;font-family:inherit;\" style-hover=\"{{ mb.hoverStyle }}\">\n            <span style=\"{{ mb.dotStyle }}\"><\u002Fspan>\n            <span style=\"flex:1;font-size:14.5px;font-weight:600;color:#1F2937;\">{{ mb.name }}<\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:600;color:#9CA3AF;font-variant-numeric:tabular-nums;\">{{ mb.ratio }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n        <button onclick=\"{{ closeModal }}\" style=\"width:100%;margin-top:12px;background:#F3F6F5;border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:14px;font-weight:600;color:#374151;cursor:pointer;\">Seguir respondiendo<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SOS MODAL -->\n  <sc-if value=\"{{ sosOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSos }}\" style=\"position:fixed;inset:0;z-index:90;background:rgba(10,14,13,.4);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:24px;animation:overlayin .15s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:400px;background:#fff;border-radius:22px;box-shadow:0 24px 60px -12px rgba(0,0,0,.35);padding:28px;animation:fadein .2s ease;\">\n        <div style=\"width:42px;height:42px;border-radius:13px;background:#FFF1F2;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FB7185\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 style=\"margin:0 0 8px;font-size:19px;font-weight:700;color:#0A0A0A;\">No tienes que pasarlo solo/a<\u002Fh3>\n        <p style=\"margin:0 0 20px;font-size:14.5px;line-height:1.6;color:#6B7280;\">Si te sientes mal o con pensamientos de hacerte daño, busca ayuda ahora. Hablar con alguien puede ayudar.<\u002Fp>\n        <button style=\"display:flex;align-items:center;gap:12px;width:100%;background:#45988C;border:none;border-radius:14px;padding:15px;color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:left;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z\"><\u002Fpath><\u002Fsvg>\n          Hablar con mi psicóloga ahora\n        <\u002Fbutton>\n        <a href=\"tel:113\" style=\"display:flex;align-items:center;gap:12px;width:100%;background:#F3F6F5;border:none;border-radius:14px;padding:15px;color:#1F2937;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;box-sizing:border-box;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#45988C\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z\"><\u002Fpath><\u002Fsvg>\n          <span style=\"flex:1;\">Línea 113, opción 5<br><span style=\"font-size:12.5px;font-weight:500;color:#9CA3AF;\">Salud mental, 24/7, gratis<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <button onclick=\"{{ closeSos }}\" style=\"width:100%;margin-top:14px;background:none;border:none;color:#9CA3AF;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;\">Volver al cuestionario<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DONE TOAST (no bloqueante) -->\n  <sc-if value=\"{{ doneOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:90;background:#0A0A0A;color:#fff;border-radius:14px;padding:13px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 16px 40px -12px rgba(0,0,0,.4);animation:slidedowntoast .25s ease;max-width:calc(100vw - 32px);\">\n      <span style=\"width:24px;height:24px;border-radius:99px;background:#45988C;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <span style=\"font-size:13.5px;font-weight:600;line-height:1.3;\">Respuestas enviadas. Solo tu psicóloga podrá verlas.<\u002Fspan>\n      <button onclick=\"{{ closeDone }}\" style=\"background:none;border:none;color:#9CA3AF;cursor:pointer;display:flex;margin-left:2px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#45988C&quot;,&quot;options&quot;:[&quot;#45988C&quot;,&quot;#0EA5A5&quot;,&quot;#347F74&quot;,&quot;#14B8A6&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;default&quot;:&quot;comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { answers: {}, validate: false, scenario: 'vacio', viewport: 'desktop', showModal: false, sosOpen: false, doneOpen: false };\n\n  defs() {\n    const freq4 = ['Nunca', 'Algunos días', 'Más de la mitad', 'Casi todos los días'];\n    const agree4 = ['Muy en desacuerdo', 'En desacuerdo', 'De acuerdo', 'Muy de acuerdo'];\n    const who6 = ['Nunca', 'Casi nunca', 'A veces', 'Más de la mitad', 'Casi siempre', 'Siempre'];\n    const ucla3 = ['Casi nunca', 'Algunas veces', 'A menudo'];\n    const yn = ['Sí', 'No'];\n    return [\n      { id: 'phq', name: 'Cómo te has sentido', instruction: 'Durante las últimas dos semanas, ¿con qué frecuencia te has sentido afectado/a por lo siguiente?', type: 'likert', scale: freq4, items: [\n        'Tengo poco interés o placer en hacer las cosas.',\n        'Me he sentido decaído/a, deprimido/a o sin esperanza.',\n        'Me cuesta dormir, o duermo demasiado.',\n        'Me he sentido cansado/a o con poca energía.',\n        'Tengo poco apetito, o como en exceso.',\n        'Me siento mal conmigo mismo/a, o siento que soy un fracaso.',\n        'Me cuesta concentrarme en clase, al leer o ver algo.',\n        'Me muevo o hablo tan lento que otros lo notan, o al revés, estoy muy inquieto/a.',\n        'He pensado que estaría mejor sin estar aquí, o en hacerme daño.' ] },\n      { id: 'gad', name: 'Preocupación y tensión', instruction: 'Durante las últimas dos semanas, ¿con qué frecuencia te ha molestado lo siguiente?', type: 'likert', scale: freq4, items: [\n        'Me he sentido nervioso/a, ansioso/a o muy tenso/a.',\n        'No puedo dejar de preocuparme o controlar mis preocupaciones.',\n        'Me preocupo demasiado por distintas cosas.',\n        'Me cuesta relajarme.',\n        'Estoy tan inquieto/a que me cuesta quedarme tranquilo/a.',\n        'Me irrito o me enojo con facilidad.',\n        'Siento miedo, como si algo malo fuera a pasar.' ] },\n      { id: 'rses', name: 'Cómo te ves a ti mismo/a', instruction: 'Indica qué tan de acuerdo estás con cada frase sobre ti mismo/a.', type: 'likert', scale: agree4, items: [\n        'Siento que soy una persona valiosa, al menos igual que los demás.',\n        'Creo que tengo varias cualidades buenas.',\n        'En general, me inclino a pensar que soy un/a fracasado/a.',\n        'Soy capaz de hacer las cosas tan bien como la mayoría.',\n        'Siento que no tengo mucho de qué estar orgulloso/a.',\n        'Tengo una actitud positiva hacia mí mismo/a.',\n        'En general, estoy satisfecho/a conmigo mismo/a.',\n        'Me gustaría tener más respeto por mí mismo/a.',\n        'A veces me siento poco útil.',\n        'A veces pienso que no sirvo para nada.' ] },\n      { id: 'srq', name: 'En tu día a día', instruction: 'Piensa en los últimos 30 días y responde Sí o No con sinceridad.', type: 'binary', scale: yn, items: [\n        '¿Tienes dolores de cabeza con frecuencia?',\n        '¿Tienes poco apetito?',\n        '¿Duermes mal?',\n        '¿Te asustas con facilidad?',\n        '¿Sientes temblor en las manos?',\n        '¿Te sientes nervioso/a o tenso/a?',\n        '¿Te cuesta hacer bien la digestión?',\n        '¿Te cuesta pensar con claridad?',\n        '¿Te sientes triste la mayor parte del tiempo?',\n        '¿Lloras más que antes?',\n        '¿Te cuesta disfrutar tus actividades de cada día?',\n        '¿Te cuesta tomar decisiones?',\n        '¿Sientes que el estudio se te hace una carga?',\n        '¿Sientes que no puedes con tu día a día?',\n        '¿Has perdido interés en las cosas?',\n        '¿Sientes que eres una persona poco útil?',\n        '¿Has pensado en quitarte la vida?',\n        '¿Te sientes cansado/a todo el tiempo?',\n        '¿Tienes sensaciones desagradables en el estómago?',\n        '¿Te cansas con facilidad?' ] },\n      { id: 'who', name: 'Tu bienestar', instruction: 'Durante las últimas dos semanas, ¿con qué frecuencia te has sentido así?', type: 'likert', scale: who6, items: [\n        'Me he sentido alegre y de buen ánimo.',\n        'Me he sentido tranquilo/a y relajado/a.',\n        'Me he sentido activo/a y con energía.',\n        'Me he despertado sintiéndome fresco/a y con ganas.',\n        'Mi vida diaria ha estado llena de cosas que me interesan.' ] },\n      { id: 'ucla', name: 'Compañía y conexión', instruction: '¿Con qué frecuencia te sientes de estas maneras?', type: 'likert', scale: ucla3, items: [\n        '¿Con qué frecuencia sientes que te falta compañía?',\n        '¿Con qué frecuencia te sientes excluido/a o dejado/a de lado?',\n        '¿Con qué frecuencia te sientes aislado/a de los demás?' ] },\n      { id: 'frases', name: 'Completa las frases', instruction: 'Completa cada frase con lo primero que se te venga. No hay respuestas correctas.', type: 'text', scale: [], items: [\n        'Yo soy…', 'Cuando estoy solo/a…', 'Lo que más me da miedo es…', 'Mi familia…', 'En el futuro me gustaría…' ] }\n    ];\n  }\n\n  order() {\n    if (this._order) return this._order;\n    const o = []; this._req = {};\n    this.defs().forEach(b => b.items.forEach((t, qi) => { const id = b.id + '-' + qi; o.push(id); this._req[id] = b.type !== 'text'; }));\n    this._order = o; this._next = {};\n    o.forEach((id, i) => this._next[id] = o[i + 1] || null);\n    return o;\n  }\n\n  G() { return this.props.accent || '#45988C'; }\n  isCompact() { return (this.props.density || 'comfortable') === 'compact'; }\n\n  answer(qid, val) {\n    this.order();\n    this.setState(s => ({ answers: { ...s.answers, [qid]: val } }), () => {\n      const n = this._next[qid];\n      if (n) requestAnimationFrame(() => {\n        const w = document.querySelector('[data-qwrap=\"' + n + '\"]');\n        const el = w && w.querySelector('button,textarea');\n        if (el) el.focus({ preventScroll: true });\n      });\n    });\n  }\n\n  onText(qid, e) {\n    const v = e.target.value;\n    e.target.style.height = 'auto';\n    e.target.style.height = e.target.scrollHeight + 'px';\n    this.setState(s => ({ answers: { ...s.answers, [qid]: v } }));\n  }\n\n  scrollToQ(qid) {\n    const el = document.querySelector('[data-qid=\"' + qid + '\"]');\n    if (el) { const top = el.getBoundingClientRect().top + window.scrollY - 130; window.scrollTo({ top, behavior: 'smooth' }); }\n  }\n  scrollToBlock(id) {\n    const el = document.querySelector('[data-blockid=\"' + id + '\"]');\n    if (el) { const top = el.getBoundingClientRect().top + window.scrollY - 110; window.scrollTo({ top, behavior: 'smooth' }); }\n  }\n\n  applyScenario(name) {\n    this.order();\n    const A = {};\n    const defs = this.defs();\n    const skip = { 2: 1, 17: 1, 41: 1 };\n    const sample = ['Yo soy alguien tranquilo que a veces piensa demasiado.', 'Cuando estoy solo/a me pongo a escuchar música.', 'Lo que más me da miedo es decepcionar a mi familia.', 'Mi familia me apoya, aunque a veces discutimos.', 'En el futuro me gustaría estudiar algo que me apasione.'];\n    let req = 0;\n    defs.forEach(b => b.items.forEach((t, qi) => {\n      const qid = b.id + '-' + qi;\n      if (b.type === 'text') {\n        if (name === 'completo' || name === 'validacion') A[qid] = sample[qi] || '';\n        return;\n      }\n      const count = b.scale.length;\n      const v = (qi * 3 + 1) % count;\n      const ri = req; req++;\n      if (name === 'parcial') { if (ri < 28) A[qid] = v; }\n      else if (name === 'completo') { A[qid] = v; }\n      else if (name === 'validacion') { if (!skip[ri]) A[qid] = v; }\n    }));\n    this.setState({ answers: A, validate: name === 'validacion', scenario: name }, () => {\n      if (name === 'validacion') {\n        const miss = this.order().find(id => this._req[id] && A[id] === undefined);\n        if (miss) setTimeout(() => this.scrollToQ(miss), 60);\n      } else window.scrollTo({ top: 0, behavior: 'smooth' });\n    });\n  }\n\n  onFinalize() {\n    this.order();\n    const A = this.state.answers;\n    const miss = this.order().find(id => this._req[id] && A[id] === undefined);\n    if (miss) { this.setState({ validate: true }, () => setTimeout(() => this.scrollToQ(miss), 30)); }\n    else { this.setState({ doneOpen: true }); clearTimeout(this._doneT); this._doneT = setTimeout(() => this.setState({ doneOpen: false }), 4000); }\n  }\n\n  optStyle(type, count, selected, G) {\n    if (type === 'binary') {\n      const base = { flex: '1 1 0', maxWidth: '168px', padding: '15px 16px', borderRadius: '14px', border: '1.5px solid #E5E7EB', background: '#fff', color: '#374151', fontSize: '15px', fontWeight: 600, fontFamily: 'inherit', cursor: 'pointer', textAlign: 'center', transition: 'all .15s ease' };\n      return selected ? { ...base, borderColor: G, background: G, color: '#fff', boxShadow: '0 4px 12px -2px rgba(69,152,140,.35)' } : base;\n    }\n    const many = count >= 6;\n    const base = { flex: '1 1 0', minWidth: many ? '90px' : '118px', padding: many ? '11px 6px' : '12px 9px', borderRadius: '13px', border: '1.5px solid #E5E7EB', background: '#fff', color: '#4B5563', fontSize: many ? '12.5px' : '13.5px', fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer', textAlign: 'center', lineHeight: 1.25, transition: 'all .15s ease' };\n    return selected ? { ...base, borderColor: G, background: G, color: '#fff', fontWeight: 600, boxShadow: '0 3px 10px -2px rgba(69,152,140,.3)' } : base;\n  }\n\n  renderVals() {\n    this.order();\n    const A = this.state.answers;\n    const validate = this.state.validate;\n    const G = this.G();\n    const compact = this.isCompact();\n    const mobile = this.state.viewport === 'mobile';\n    const defs = this.defs();\n\n    let answered = 0, total = 0;\n    const perBlock = {};\n    const blocks = defs.map((b, bi) => {\n      let bAns = 0, bTot = 0;\n      const questions = b.items.map((text, qi) => {\n        const qid = b.id + '-' + qi;\n        const val = A[qid];\n        const isText = b.type === 'text';\n        const required = !isText;\n        const ansQ = isText ? (typeof val === 'string' && val.trim().length > 0) : (val !== undefined && val !== null);\n        bTot++; if (ansQ) bAns++;\n        if (required) { total++; if (ansQ) answered++; }\n        const missHL = validate && required && !ansQ;\n\n        const rowStyle = missHL\n          ? { display: 'flex', gap: mobile ? '12px' : '16px', padding: compact ? '13px 14px' : '18px 14px', margin: '0 -14px', borderRadius: '14px', background: '#EDF5F3', boxShadow: 'inset 3px 0 0 ' + G, transition: 'background .2s ease' }\n          : { display: 'flex', gap: mobile ? '12px' : '16px', padding: (compact ? '13px' : '19px') + ' 0', transition: 'background .2s ease' };\n\n        const numStyle = { fontVariantNumeric: 'tabular-nums', fontSize: '13.5px', fontWeight: 700, color: ansQ ? G : '#C7CDD4', lineHeight: 1.3 };\n        const textStyle = { fontSize: mobile ? '15px' : '16px', fontWeight: 500, color: '#1F2937', lineHeight: 1.5, letterSpacing: '-.01em' };\n\n        let options = [], optionsWrapStyle = null, hasOptions = false;\n        if (!isText) {\n          hasOptions = true;\n          const count = b.scale.length;\n          options = b.scale.map((lab, oi) => {\n            const sel = val === oi;\n            return {\n              label: lab,\n              cls: sel ? 'pill psel' : 'pill',\n              style: this.optStyle(b.type, count, sel, G),\n              onClick: () => this.answer(qid, oi)\n            };\n          });\n          optionsWrapStyle = b.type === 'binary'\n            ? { display: 'flex', gap: '12px', marginTop: '13px' }\n            : { display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '13px' };\n        }\n\n        return { qid, num: qi + 1, text, rowStyle, numStyle, textStyle, answered: ansQ,\n          isText, hasOptions, options, optionsWrapStyle,\n          textValue: isText ? (val || '') : '',\n          textFocusStyle: { borderBottomColor: '#9ECFC6' },\n          onText: (e) => this.onText(qid, e) };\n      });\n      perBlock[b.id] = { ans: bAns, tot: bTot };\n\n      const isMatrix = b.type === 'likert' && !mobile;\n      let matrix = null;\n      if (b.type === 'likert') {\n        const N = b.scale.length;\n        const colW = N >= 6 ? '56px' : (N >= 4 ? '74px' : '96px');\n        const cols = 'minmax(150px,1fr) repeat(' + N + ',' + colW + ')';\n        matrix = {\n          cols: b.scale,\n          headStyle: { display: 'grid', gridTemplateColumns: cols, alignItems: 'end' },\n          rows: questions.map(q => {\n            const val = A[q.qid];\n            const miss = validate && (val === undefined || val === null);\n            const rowStyle = miss\n              ? { display: 'grid', gridTemplateColumns: cols, alignItems: 'center', background: '#EDF5F3', boxShadow: 'inset 3px 0 0 ' + G }\n              : { display: 'grid', gridTemplateColumns: cols, alignItems: 'center' };\n            return {\n              qid: q.qid, num: q.num, text: q.text, answered: q.answered, numStyle: q.numStyle, rowStyle,\n              cells: b.scale.map((lab, oi) => {\n                const sel = val === oi;\n                return {\n                  label: lab, selected: sel,\n                  circleClass: sel ? 'mcirc msel' : 'mcirc',\n                  onClick: () => this.answer(q.qid, oi)\n                };\n              })\n            };\n          })\n        };\n      }\n\n      return {\n        id: b.id, name: b.name, instruction: b.instruction,\n        sepStyle: { marginTop: bi === 0 ? '38px' : '50px' },\n        nameStyle: { fontSize: '12.5px', fontWeight: 700, letterSpacing: '.09em', textTransform: 'uppercase', color: G },\n        questions, isMatrix, showRows: !isMatrix, matrix\n      };\n    });\n\n    const pct = total ? Math.round(answered / total * 100) : 0;\n    const counterText = answered + ' / ' + total + ' respondidas';\n    const pillLabel = answered + ' de ' + total + ' (' + pct + '%)';\n    const complete = answered >= total;\n\n    const scenarios = [\n      { key: 'vacio', label: 'Vacío' }, { key: 'parcial', label: 'Parcial' },\n      { key: 'completo', label: 'Completo' }, { key: 'validacion', label: 'Validación' }\n    ].map(s => ({\n      label: s.label,\n      onClick: () => this.applyScenario(s.key),\n      style: { padding: '6px 11px', borderRadius: '9px', border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: '12px', fontWeight: 600,\n        background: this.state.scenario === s.key ? '#45988C' : 'transparent',\n        color: this.state.scenario === s.key ? '#fff' : 'rgba(255,255,255,.7)' }\n    }));\n    const viewBtns = [ { key: 'desktop', label: 'Desktop' }, { key: 'mobile', label: 'Móvil' } ].map(v => ({\n      label: v.label,\n      onClick: () => this.setState({ viewport: v.key }),\n      style: { padding: '6px 11px', borderRadius: '9px', border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: '12px', fontWeight: 600,\n        background: this.state.viewport === v.key ? 'rgba(255,255,255,.18)' : 'transparent',\n        color: this.state.viewport === v.key ? '#fff' : 'rgba(255,255,255,.7)' }\n    }));\n\n    const modalBlocks = defs.map(b => {\n      const p = perBlock[b.id]; const done = p.ans >= p.tot;\n      return {\n        name: b.name, ratio: p.ans + '/' + p.tot,\n        onGo: () => this.setState({ showModal: false }, () => setTimeout(() => this.scrollToBlock(b.id), 60)),\n        hoverStyle: { background: '#F3F6F5' },\n        dotStyle: { width: '12px', height: '12px', borderRadius: '99px', flexShrink: 0,\n          background: done ? G : (p.ans > 0 ? '#C5E1DC' : '#E5E7EB'),\n          boxShadow: done ? '0 0 0 3px rgba(69,152,140,.15)' : 'none' }\n      };\n    });\n\n    return {\n      blocks, counterText, pillLabel,\n      progressFillStyle: { height: '100%', borderRadius: '99px', background: G, width: pct + '%', transition: 'width .45s cubic-bezier(.4,0,.2,1)' },\n      miniFillStyle: { display: 'block', height: '100%', borderRadius: '99px', background: G, width: pct + '%', transition: 'width .45s cubic-bezier(.4,0,.2,1)' },\n      sheetWrapStyle: { width: '100%', maxWidth: mobile ? '380px' : '860px', transition: 'max-width .35s cubic-bezier(.4,0,.2,1)' },\n      sheetStyle: { background: '#fff', borderRadius: mobile ? '20px' : '24px', boxShadow: '0 1px 3px rgba(16,24,40,.04), 0 18px 50px -16px rgba(16,24,40,.14)', padding: mobile ? '30px 22px 44px' : '56px 64px 60px' },\n      finalizeHint: complete ? 'Ya respondiste todo. Cuando quieras, envía tus respuestas.' : 'Cuando termines de responder todo, el botón Finalizar se activará.',\n      finalizeLabel: complete ? 'Finalizar y enviar' : 'Finalizar',\n      finalizeStyle: { padding: '15px 28px', borderRadius: '14px', border: 'none', fontFamily: 'inherit', fontSize: '15px', fontWeight: 600, cursor: 'pointer', transition: 'all .2s ease',\n        background: complete ? G : '#F1F3F2', color: complete ? '#fff' : '#9CA3AF', boxShadow: complete ? '0 8px 20px -6px rgba(69,152,140,.45)' : 'none' },\n      finalizeHoverStyle: complete ? { filter: 'brightness(.95)' } : { background: '#E9ECEB' },\n      saveHoverStyle: { color: G },\n      sosHoverStyle: { filter: 'brightness(1.05)', boxShadow: '0 12px 30px -8px rgba(244,63,94,.7)' },\n      scenarios, viewBtns, modalBlocks,\n      onFinalize: () => this.onFinalize(),\n      onSave: () => this.setState({ showModal: false }, () => { /* save stub */ }),\n      openModal: () => this.setState({ showModal: true }),\n      closeModal: () => this.setState({ showModal: false }),\n      showModal: this.state.showModal,\n      openSos: () => this.setState({ sosOpen: true }),\n      closeSos: () => this.setState({ sosOpen: false }),\n      sosOpen: this.state.sosOpen,\n      doneOpen: this.state.doneOpen,\n      closeDone: () => this.setState({ doneOpen: false }),\n      stop: (e) => e.stopPropagation()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
